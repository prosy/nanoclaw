# Docker image build, source protection gate, and publish (M2-P3 T4.3, T4.4)
# Triggers on push to main with version tags.
# Image is private on GHCR — requires docker login with GitHub token.

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nanoclaw-travel

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # T4.4: Source protection gate — fails CI if .ts files found in image
      - name: Source protection gate
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "Checking image: $IMAGE_TAG"

          # Check for .ts source files (excluding .d.ts type declarations)
          TS_FILES=$(docker run --rm --entrypoint sh "$IMAGE_TAG" -c \
            "find /app -name '*.ts' ! -name '*.d.ts' 2>/dev/null || true")

          if [ -n "$TS_FILES" ]; then
            echo "[CI-ERR] Source files detected in Docker image. Build is rejected."
            echo "Files found:"
            echo "$TS_FILES"
            exit 1
          fi

          # Check for tsconfig.json
          TSCONFIG=$(docker run --rm --entrypoint sh "$IMAGE_TAG" -c \
            "find /app -name 'tsconfig.json' 2>/dev/null || true")

          if [ -n "$TSCONFIG" ]; then
            echo "[CI-ERR] tsconfig.json found in Docker image. Build is rejected."
            exit 1
          fi

          echo "Source protection gate passed — no .ts source files in image."

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
